<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <title>Frontend Mentor | Blog preview card</title>
    <link rel="stylesheet" href="./styles/styles.css" />
  </head>
  <body>
    <main>
      <article class="blog-card">
        <img
          src="./assets/images/illustration-article.svg"
          alt=""
          width="336"
          height="201"
          class="blog-card__image"
        />
        <div class="blog-card__content">
          <p class="blog-card__category">Learning</p>
          <p class="blog-card__date">
            Published <time datetime="2023-12-21">21 Dec 2023</time>
          </p>
          <h2 class="blog-card__title">
            <a href="#" class="blog-card__link">HTML & CSS foundations</a>
          </h2>
          <p class="blog-card__description">
            These languages are the backbone of every website, defining
            structure, content, and presentation.
          </p>
        </div>
        <div class="blog-card__author">
          <img
            src="./assets/images/image-avatar.webp"
            alt=""
            width="32"
            height="32"
            class="blog-card__avatar"
          />
          <p class="blog-card__author-name">Greg Hooper</p>
        </div>
      </article>
    </main>
  </body>
</html>
